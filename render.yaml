services:
  - type: web
    name: autoassist-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: ./database/cars.db
      - key: FRONTEND_URL
        sync: false
